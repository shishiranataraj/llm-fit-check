# Maps upstream leaderboard model identifiers -> catalog model id.
# When upstream emits a name not in this map, the refresh script logs it and
# skips it — so adding a new model means adding one entry here plus a stub
# in scripts/footprints.yaml.
#
# Keys are matched case-insensitively. Use HuggingFace repo ids where possible.

aliases:
  # DeepSeek R1 distills
  "deepseek-ai/DeepSeek-R1-Distill-Qwen-32B": deepseek-r1-distill-qwen-32b
  "deepseek-ai/DeepSeek-R1-Distill-Qwen-14B": deepseek-r1-distill-qwen-14b
  "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B":  deepseek-r1-distill-qwen-7b

  # Qwen2.5
  "Qwen/Qwen2.5-72B-Instruct":        qwen2.5-72b
  "Qwen/Qwen2.5-32B-Instruct":        qwen2.5-32b
  "Qwen/Qwen2.5-14B-Instruct":        qwen2.5-14b
  "Qwen/Qwen2.5-7B-Instruct":         qwen2.5-7b
  "Qwen/Qwen2.5-Coder-32B-Instruct":  qwen2.5-coder-32b
  "Qwen/Qwen2.5-Coder-14B-Instruct":  qwen2.5-coder-14b
  "Qwen/Qwen2.5-Coder-7B-Instruct":   qwen2.5-coder-7b

  # Meta Llama
  "meta-llama/Llama-3.3-70B-Instruct": llama-3.3-70b
  "meta-llama/Llama-3.1-8B-Instruct":  llama-3.1-8b
  "meta-llama/Llama-3.2-3B-Instruct":  llama-3.2-3b
  "meta-llama/Llama-3.2-1B-Instruct":  llama-3.2-1b

  # Mistral
  "mistralai/Mistral-Small-24B-Instruct-2501": mistral-small-3
  "mistralai/Mistral-Nemo-Instruct-2407":      mistral-nemo-12b

  # Google
  "google/gemma-2-27b-it": gemma2-27b
  "google/gemma-2-9b-it":  gemma2-9b

  # Microsoft
  "microsoft/phi-4": phi-4
