name: Refresh leaderboard snapshot

on:
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install refresh deps
        run: pip install httpx pyyaml
      - name: Regenerate snapshot
        run: python scripts/refresh_snapshot.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet src/llm_fit_check/data/snapshot.json; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add src/llm_fit_check/data/snapshot.json
            git commit -m "chore: refresh leaderboard snapshot"
            git push
          fi
